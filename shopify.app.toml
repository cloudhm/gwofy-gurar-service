# Shopify app configuration — sync scopes with Partner Dashboard.
# https://shopify.dev/docs/apps/tools/cli/configuration

name = "Gwofy Guard"
client_id = "YOUR_CLIENT_ID"
application_url = "https://YOUR_APP_HOST/"
embedded = true

[access_scopes]
# Plan §1b — adjust after Partner Dashboard review (Protected Customer Data, read_all_orders, etc.)
scopes = "read_customers,read_users,read_products,write_products,read_orders,write_orders,read_markets"

[auth]
redirect_urls = [
  "https://YOUR_API_GATEWAY_URL/oauth/callback"
]

[webhooks]
api_version = "2024-10"

[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/webhooks/shopify"

[[webhooks.subscriptions]]
topics = [ "products/create", "products/update" ]
uri = "/webhooks/shopify"

[[webhooks.subscriptions]]
topics = [ "orders/create", "orders/updated" ]
uri = "/webhooks/shopify"

[[webhooks.subscriptions]]
topics = [ "customers/create", "customers/update" ]
uri = "/webhooks/shopify"

[[webhooks.subscriptions]]
topics = [ "shop/update" ]
uri = "/webhooks/shopify"

[[webhooks.subscriptions]]
topics = [ "markets/create", "markets/update" ]
uri = "/webhooks/shopify"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/webhooks/shopify"
